<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>造梦 Web UI</title>
    <link rel="stylesheet" href="/web/app.css?v=20260506k" />
  </head>
  <body>
    <div id="app-shell" class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h1>造梦</h1>
          <p id="sidebar-status" class="sidebar-text">未配置模型</p>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title-row">
            <h2>最近会话</h2>
          </div>
          <div id="sidebar-session-list" class="session-list"></div>
        </div>
      </aside>

      <main class="main-shell">
        <header class="topbar">
          <div class="topbar-main">
            <strong id="topbar-title">先连接模型</strong>
            <span id="topbar-subtitle">当前还没有可用模型</span>
          </div>
          <div class="topbar-actions">
            <button id="toggle-sidebar-button" type="button" class="topbar-icon-button secondary-button" aria-label="收起会话栏" title="收起会话栏">☰</button>
            <button id="new-dialogue-session-button" type="button" class="topbar-icon-button secondary-button" aria-label="新建会话" title="新建会话">＋</button>
            <button id="open-settings-button" type="button" class="topbar-icon-button secondary-button" aria-label="模型设置" title="模型设置">⚙</button>
            <span class="topbar-meta"><strong id="dialogue-session-id">-</strong></span>
          </div>
        </header>

        <section id="workflow-strip" class="workflow-strip">
          <section id="step-model" class="workflow-card">
            <div class="workflow-head">
              <p class="workflow-label">第一步</p>
              <h2>连接模型</h2>
            </div>
            <p class="workflow-copy">先填好模型配置，后面的蒸馏和聊天都会直接使用这里的模型。</p>
            <div class="workflow-actions">
              <button id="open-settings-primary" type="button">填写模型配置</button>
            </div>
            <div id="model-summary" class="summary-grid hidden">
              <div class="summary-item"><span>Provider</span><strong id="model-provider-view">-</strong></div>
              <div class="summary-item"><span>Model</span><strong id="model-name-view">-</strong></div>
              <div class="summary-item"><span>Base URL</span><strong id="model-base-url-view">-</strong></div>
            </div>
          </section>

          <section id="step-distill" class="workflow-card hidden">
            <div class="workflow-head">
              <p class="workflow-label">第二步</p>
              <h2>选择小说和人物</h2>
            </div>
            <form id="create-run-form" class="stack-form">
              <label class="field">
                <span>小说文件</span>
                <input id="novel-file" type="file" accept=".txt,.md,.text,.epub" required />
              </label>
              <label class="field">
                <span>人物名称</span>
                <input id="characters" type="text" placeholder="例如：林黛玉, 贾宝玉, 薛宝钗" required />
              </label>
              <div class="grid">
                <label class="field">
                  <span>最多提取句数</span>
                  <input id="max-sentences" type="number" min="20" max="300" value="120" />
                </label>
                <label class="field">
                  <span>最多提取字数</span>
                  <input id="max-chars" type="number" min="2000" max="200000" value="50000" />
                </label>
              </div>
              <div class="workflow-actions">
                <button id="submit-button" type="submit">开始蒸馏</button>
              </div>
            </form>
            <p id="form-status" class="workflow-note"></p>
          </section>

          <section id="step-progress" class="workflow-card hidden">
            <div class="workflow-head">
              <p class="workflow-label">第三步</p>
              <h2>正在处理</h2>
            </div>
            <p id="progress-copy" class="workflow-copy">系统正在自动蒸馏人物并生成关系图谱。</p>
            <div class="summary-grid">
              <div class="summary-item"><span>小说</span><strong id="run-novel">-</strong></div>
              <div class="summary-item"><span>人物</span><strong id="run-characters">-</strong></div>
              <div class="summary-item"><span>状态</span><strong id="run-summary">-</strong></div>
            </div>
            <div id="redistill-panel" class="redistill-panel hidden">
              <label class="field">
                <span>继续蒸馏人物</span>
                <input id="redistill-characters" type="text" placeholder="例如：王熙凤, 贾母" />
              </label>
              <div class="button-row compact-row">
                <button id="redistill-add-button" type="button" class="secondary-button">新增人物</button>
                <button id="redistill-refresh-button" type="button" class="secondary-button">重蒸已有</button>
              </div>
              <div id="redistill-character-pills" class="pill-row"></div>
              <div class="button-row compact-row">
                <button id="redistill-button" type="button" class="secondary-button">再次蒸馏</button>
              </div>
              <p id="redistill-status" class="workflow-note"></p>
            </div>
            <div id="graph-links" class="button-row hidden"></div>
            <ol id="events" class="timeline"></ol>
          </section>

          <section id="step-chat-setup" class="workflow-card hidden">
            <div class="workflow-head">
              <p class="workflow-label">第四步</p>
              <h2>开始聊天</h2>
            </div>
            <form id="dialogue-session-form" class="stack-form compact-chat-form">
              <div class="field compact-field">
                <span>快捷选择人物</span>
                <div id="dialogue-character-pills" class="pill-row"></div>
              </div>
              <div class="inline-chat-form">
                <label class="field compact-field">
                  <span>模式</span>
                  <select id="dialogue-mode">
                    <option value="observe">旁观</option>
                    <option value="act">代入角色</option>
                    <option value="insert">代入自己</option>
                  </select>
                </label>
                <label class="field compact-field field-wide">
                  <span>目标是谁</span>
                  <input id="dialogue-participants" type="text" placeholder="点上方人物即可自动填入" />
                </label>
                <label id="controlled-field" class="field compact-field">
                  <span>我代入谁</span>
                  <input id="dialogue-controlled" type="text" placeholder="代入角色时填写，可点人物名" />
                </label>
                <label id="self-name-field" class="field compact-field">
                  <span>我的名字</span>
                  <input id="dialogue-self-name" type="text" placeholder="代入自己时填写，例如：阿眠" />
                </label>
                <label id="self-identity-field" class="field compact-field">
                  <span>我的身份</span>
                  <input id="dialogue-self-identity" type="text" placeholder="例如：贾府来客" />
                </label>
                <label id="self-style-field" class="field compact-field">
                  <span>场景或氛围</span>
                  <input id="dialogue-self-style" type="text" placeholder="可留空，例如：初见、试探、夜谈" />
                </label>
                <div class="workflow-actions compact-actions">
                  <button type="submit">进入聊天</button>
                </div>
              </div>
            </form>
            <p id="dialogue-session-status" class="workflow-note"></p>
          </section>
        </section>

        <section class="chat-panel">
          <div id="dialogue-empty" class="chat-empty">
            <div class="empty-copy">
              <p class="empty-title" id="next-step-title">先配置模型</p>
              <p id="next-step-body">填入模型地址、模型名称和密钥，保存后才能继续。</p>
            </div>
          </div>

          <div id="dialogue-detail" class="hidden chat-detail">
            <div id="chat-content" class="chat-content">
              <div id="dialogue-transcript" class="transcript"></div>
            </div>
          </div>
        </section>

        <footer id="turn-stage" class="composer-shell hidden">
          <div class="composer-card">
            <div class="composer-main">
              <textarea id="dialogue-message" rows="1" placeholder="输入你想说的话"></textarea>
              <button id="prepare-turn-button" type="button" aria-label="发送">↑</button>
            </div>
            <p id="dialogue-turn-status" class="muted"></p>
          </div>
        </footer>
      </main>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-card">
        <div class="panel-head">
          <div>
            <p class="panel-label">模型设置</p>
            <h3>连接你的模型</h3>
          </div>
          <button id="close-settings-button" type="button" class="secondary-button">关闭</button>
        </div>
        <form id="model-settings-form" class="stack-form">
          <div class="grid">
            <label class="field">
              <span>Provider</span>
              <select id="model-provider">
                <option value="openai-compatible">openai-compatible</option>
                <option value="openai">openai</option>
                <option value="anthropic">anthropic</option>
                <option value="ollama">ollama</option>
              </select>
            </label>
            <label class="field">
              <span>Model</span>
              <input id="model-name" type="text" placeholder="例如：gpt-4.1 / deepseek-chat / qwen2.5:14b" />
            </label>
          </div>
          <label class="field">
            <span>Base URL</span>
            <input id="model-base-url" type="text" placeholder="例如：https://api.openai.com/v1" />
          </label>
          <label class="field">
            <span>API Key</span>
            <input id="model-api-key" type="password" placeholder="输入 API Key" />
          </label>
          <div class="workflow-actions">
            <button id="save-model-settings-button" type="submit">保存模型配置</button>
          </div>
        </form>
        <p id="model-settings-status" class="workflow-note"></p>
      </div>
    </div>

    <script src="/web/app.js?v=20260506k"></script>
  </body>
</html>
